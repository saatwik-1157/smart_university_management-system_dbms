<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAP Enterprise Master Hub | Unified University Suite</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body id="master-body">

    <!-- Unified Master Sidebar -->
    <nav class="sidebar">
        <div class="logo-container">
            <div class="logo">VITAP Enterprise</div>
            <div id="active-role-tag" style="font-size: 0.7rem; color: var(--acc-primary); margin-top: 0.5rem; font-weight: 800;">ADMIN COMMAND CENTER</div>
        </div>
        
        <ul id="master-nav" class="nav-links">
            <!-- Dynamic Navigation injected by app.js -->
        </ul>

        <div style="margin-top: auto;">
            <div style="margin-bottom: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 1.5rem;">
                <p style="font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); margin-bottom: 0.75rem; text-transform: uppercase; font-weight: 700;">Switch Persona</p>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <button class="btn btn-switch" onclick="switchPortal('admin')"><i class="fas fa-shield-alt"></i> Admin Hub</button>
                    <button class="btn btn-switch" onclick="switchPortal('student')"><i class="fas fa-user-graduate"></i> Student Portal</button>
                    <button class="btn btn-switch" onclick="switchPortal('faculty')"><i class="fas fa-user-tie"></i> Faculty Suite</button>
                </div>
            </div>
            <button class="btn" style="width: 100%; background: var(--bg-navy); border: 1px solid var(--acc-primary);" onclick="togglePresentation(true)"><i class="fas fa-play"></i> Present Slides</button>
        </div>
    </nav>

    <!-- Main Dynamic Content -->
    <main id="main-portal" class="main-content">
        <header>
            <div class="header-title">
                <h1 id="portal-title">University Overview</h1>
                <p id="portal-desc" style="color: var(--text-muted); font-size: 0.8rem;">Real-time management for VITAP's 1,100+ members.</p>
            </div>
            <div id="header-search-container" class="header-right">
                <input type="text" id="global-search" style="padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border-light);" placeholder="🔍 Search University..." onkeyup="handleSearch()">
            </div>
        </header>

        <!-- View Container -->
        <div id="view-container">
            <!-- Dynamic Sub-sections like Stats, Charts, Tables as seen in previous versions -->
        </div>

    </main>

    <!-- Presentation Overlay Tier -->
    <div id="presentation-layer" class="presentation-overlay animate-fade">
        <div class="presentation-header">
            <button class="btn btn-close-pres" onclick="togglePresentation(false)"><i class="fas fa-times"></i> Exit Presentation</button>
        </div>
        <div id="presentation-slides" class="slides-container">
            <!-- Slides Injected Here -->
        </div>
        <div class="pres-controls">
            <button class="btn-ctrl" onclick="prevSlide()"><i class="fas fa-chevron-left"></i></button>
            <button class="btn-ctrl" onclick="nextSlide()"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- Administrative Audit Modal -->
    <div id="audit-modal" class="modal-overlay" onclick="closeAudit()">
        <div class="modal-content animate-slide-up" onclick="event.stopPropagation()">
            <div id="audit-content"></div>
            <button class="btn btn-close" onclick="closeAudit()" style="width: 100%; margin-top: 2rem;">Close Audit View</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
